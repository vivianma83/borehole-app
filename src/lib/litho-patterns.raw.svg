    <!-- 角闪斜长片麻岩：水平短线 + 偶尔斑点（参考模板里整段都是这套花纹） -->
    <pattern id="g-gneiss" patternUnits="userSpaceOnUse" width="14" height="8">
      <rect width="14" height="8" fill="#FFFFFF"/>
      <line x1="0" y1="2" x2="10" y2="2" stroke="#000" stroke-width=".5"/>
      <line x1="4" y1="6" x2="14" y2="6" stroke="#000" stroke-width=".5"/>
    </pattern>
    <pattern id="g-gneiss-fresh" patternUnits="userSpaceOnUse" width="12" height="8">
      <rect width="12" height="8" fill="#FFFFFF"/>
      <line x1="0" y1="2" x2="8"  y2="2" stroke="#000" stroke-width=".55"/>
      <line x1="0" y1="6" x2="12" y2="6" stroke="#000" stroke-width=".55"/>
      <line x1="9" y1="2" x2="12" y2="2" stroke="#000" stroke-width=".55"/>
    </pattern>
    <!-- 风化层（残积/坡积）：点状 -->
    <pattern id="g-weathered" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#FFFFFF"/>
      <circle cx="2" cy="2" r=".6" fill="#000"/>
      <circle cx="6" cy="6" r=".6" fill="#000"/>
    </pattern>
    <!-- 磁铁矿体：粉红/品红实色（参考模板里矿体段用品红） -->
    <pattern id="g-ore" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#E91E63"/>
      <line x1="0" y1="0" x2="6" y2="6" stroke="#9F1239" stroke-width=".4"/>
    </pattern>
    <!-- 含矿（贫矿）：淡粉 + 短线 -->
    <pattern id="g-orepoor" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#FCE4EC"/>
      <line x1="0" y1="4" x2="8" y2="4" stroke="#9F1239" stroke-width=".5"/>
    </pattern>
    <!-- 断层破碎带：交叉斜线 -->
    <pattern id="g-fault" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#FFFFFF"/>
      <path d="M0,0 L8,8 M0,8 L8,0" stroke="#000" stroke-width=".6"/>
    </pattern>
    <!-- 大理岩 -->
    <pattern id="g-marble" patternUnits="userSpaceOnUse" width="12" height="6">
      <rect width="12" height="6" fill="#FFFFFF"/>
      <path d="M0,3 L12,3 M6,0 L6,3 M0,6 L0,3 M12,6 L12,3" stroke="#000" stroke-width=".5"/>
    </pattern>

    <!-- 砂岩：稀疏散点（颗粒感） -->
    <pattern id="g-sandstone" patternUnits="userSpaceOnUse" width="10" height="10">
      <rect width="10" height="10" fill="#FFFFFF"/>
      <circle cx="2" cy="3" r=".7" fill="#000"/>
      <circle cx="7" cy="6" r=".7" fill="#000"/>
      <circle cx="4" cy="8.5" r=".7" fill="#000"/>
    </pattern>
    <!-- 砾岩：椭圆砾石 -->
    <pattern id="g-conglomerate" patternUnits="userSpaceOnUse" width="18" height="14">
      <rect width="18" height="14" fill="#FFFFFF"/>
      <ellipse cx="4" cy="4" rx="2.5" ry="1.5" fill="none" stroke="#000" stroke-width=".5"/>
      <ellipse cx="13" cy="10" rx="3" ry="1.8" fill="none" stroke="#000" stroke-width=".5"/>
      <ellipse cx="6" cy="11" rx="1.8" ry="1.2" fill="none" stroke="#000" stroke-width=".5"/>
    </pattern>
    <!-- 粉砂岩：虚线 + 偶尔点 -->
    <pattern id="g-siltstone" patternUnits="userSpaceOnUse" width="14" height="8">
      <rect width="14" height="8" fill="#FFFFFF"/>
      <line x1="0" y1="3" x2="14" y2="3" stroke="#000" stroke-width=".35" stroke-dasharray="2,1.5"/>
      <line x1="0" y1="6.5" x2="14" y2="6.5" stroke="#000" stroke-width=".35" stroke-dasharray="2,1.5"/>
      <circle cx="9" cy="1.3" r=".4" fill="#000"/>
    </pattern>
    <!-- 泥岩：水平实线（间距大） -->
    <pattern id="g-mudstone" patternUnits="userSpaceOnUse" width="14" height="6">
      <rect width="14" height="6" fill="#FFFFFF"/>
      <line x1="0" y1="2" x2="14" y2="2" stroke="#000" stroke-width=".4"/>
      <line x1="0" y1="4.5" x2="14" y2="4.5" stroke="#000" stroke-width=".4"/>
    </pattern>
    <!-- 页岩：密集细横线 -->
    <pattern id="g-shale" patternUnits="userSpaceOnUse" width="10" height="6">
      <rect width="10" height="6" fill="#FFFFFF"/>
      <line x1="0" y1="1.5" x2="10" y2="1.5" stroke="#000" stroke-width=".3"/>
      <line x1="0" y1="3" x2="10" y2="3" stroke="#000" stroke-width=".3"/>
      <line x1="0" y1="4.5" x2="10" y2="4.5" stroke="#000" stroke-width=".3"/>
    </pattern>
    <!-- 石灰岩：砖纹 -->
    <pattern id="g-limestone" patternUnits="userSpaceOnUse" width="16" height="8">
      <rect width="16" height="8" fill="#FFFFFF"/>
      <line x1="0" y1="4" x2="16" y2="4" stroke="#000" stroke-width=".4"/>
      <line x1="0" y1="8" x2="16" y2="8" stroke="#000" stroke-width=".4"/>
      <line x1="0" y1="0" x2="0" y2="4" stroke="#000" stroke-width=".4"/>
      <line x1="8" y1="0" x2="8" y2="4" stroke="#000" stroke-width=".4"/>
      <line x1="16" y1="0" x2="16" y2="4" stroke="#000" stroke-width=".4"/>
      <line x1="4" y1="4" x2="4" y2="8" stroke="#000" stroke-width=".4"/>
      <line x1="12" y1="4" x2="12" y2="8" stroke="#000" stroke-width=".4"/>
    </pattern>
    <!-- 白云岩：砖纹 + 斜线 -->
    <pattern id="g-dolomite" patternUnits="userSpaceOnUse" width="16" height="8">
      <rect width="16" height="8" fill="#FFFFFF"/>
      <line x1="0" y1="4" x2="16" y2="4" stroke="#000" stroke-width=".4"/>
      <line x1="0" y1="8" x2="16" y2="8" stroke="#000" stroke-width=".4"/>
      <line x1="0" y1="0" x2="0" y2="4" stroke="#000" stroke-width=".4"/>
      <line x1="8" y1="0" x2="8" y2="4" stroke="#000" stroke-width=".4"/>
      <line x1="16" y1="0" x2="16" y2="4" stroke="#000" stroke-width=".4"/>
      <line x1="4" y1="4" x2="4" y2="8" stroke="#000" stroke-width=".4"/>
      <line x1="12" y1="4" x2="12" y2="8" stroke="#000" stroke-width=".4"/>
      <line x1="1" y1="0.5" x2="3" y2="3" stroke="#000" stroke-width=".3"/>
      <line x1="9" y1="0.5" x2="11" y2="3" stroke="#000" stroke-width=".3"/>
      <line x1="5" y1="4.5" x2="7" y2="7" stroke="#000" stroke-width=".3"/>
      <line x1="13" y1="4.5" x2="15" y2="7" stroke="#000" stroke-width=".3"/>
    </pattern>
    <!-- 花岗岩：十字 + 颗粒 -->
    <pattern id="g-granite" patternUnits="userSpaceOnUse" width="14" height="14">
      <rect width="14" height="14" fill="#FFFFFF"/>
      <line x1="2" y1="4" x2="5" y2="4" stroke="#000" stroke-width=".4"/>
      <line x1="3.5" y1="2.5" x2="3.5" y2="5.5" stroke="#000" stroke-width=".4"/>
      <line x1="9" y1="10" x2="12" y2="10" stroke="#000" stroke-width=".4"/>
      <line x1="10.5" y1="8.5" x2="10.5" y2="11.5" stroke="#000" stroke-width=".4"/>
      <circle cx="10.5" cy="3" r=".6" fill="#000"/>
      <circle cx="4" cy="10.5" r=".6" fill="#000"/>
    </pattern>
    <!-- 安山岩：Λ 型斑晶 -->
    <pattern id="g-andesite" patternUnits="userSpaceOnUse" width="12" height="10">
      <rect width="12" height="10" fill="#FFFFFF"/>
      <path d="M2,7 L4,3 L6,7" stroke="#000" stroke-width=".4" fill="none"/>
      <path d="M7,9 L9,5 L11,9" stroke="#000" stroke-width=".4" fill="none"/>
    </pattern>
    <!-- 玄武岩：密斜线 -->
    <pattern id="g-basalt" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#FFFFFF"/>
      <line x1="0" y1="8" x2="8" y2="0" stroke="#000" stroke-width=".5"/>
      <line x1="-2" y1="6" x2="6" y2="-2" stroke="#000" stroke-width=".5"/>
      <line x1="2" y1="10" x2="10" y2="2" stroke="#000" stroke-width=".5"/>
    </pattern>
    <!-- 凝灰岩：散布小三角（火山碎屑） -->
    <pattern id="g-tuff" patternUnits="userSpaceOnUse" width="14" height="14">
      <rect width="14" height="14" fill="#FFFFFF"/>
      <path d="M2,6 L5,3 L5,6 Z" fill="#000"/>
      <path d="M9,12 L12,9 L12,12 Z" fill="#000"/>
      <path d="M10,4 L11.5,2.5 L11.5,4 Z" fill="#000"/>
    </pattern>
    <!-- 煤层：实心黑 -->
    <pattern id="g-coal" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#1C1917"/>
    </pattern>
    <!-- 片岩：波浪线（片理） -->
    <pattern id="g-schist" patternUnits="userSpaceOnUse" width="16" height="8">
      <rect width="16" height="8" fill="#FFFFFF"/>
      <path d="M0,4 Q4,1.5 8,4 T16,4" stroke="#000" stroke-width=".4" fill="none"/>
    </pattern>
    <!-- 千枚岩：细密波浪 -->
    <pattern id="g-phyllite" patternUnits="userSpaceOnUse" width="12" height="5">
      <rect width="12" height="5" fill="#FFFFFF"/>
      <path d="M0,2.5 Q3,1 6,2.5 T12,2.5" stroke="#000" stroke-width=".3" fill="none"/>
    </pattern>
    <!-- 板岩：密集斜线 + 极薄层 -->
    <pattern id="g-slate" patternUnits="userSpaceOnUse" width="10" height="6">
      <rect width="10" height="6" fill="#FFFFFF"/>
      <line x1="0" y1="0" x2="6" y2="6" stroke="#000" stroke-width=".35"/>
      <line x1="4" y1="0" x2="10" y2="6" stroke="#000" stroke-width=".35"/>
    </pattern>

    <!-- 矿体专用：纯色实心块（不画花纹，柱状图里直接看到色块=矿体） -->
    <pattern id="g-ore-mag"    patternUnits="userSpaceOnUse" width="8" height="8"><rect width="8" height="8" fill="#C026D3"/></pattern>
    <pattern id="g-ore-red"    patternUnits="userSpaceOnUse" width="8" height="8"><rect width="8" height="8" fill="#DC2626"/></pattern>
    <pattern id="g-ore-pyrite" patternUnits="userSpaceOnUse" width="8" height="8"><rect width="8" height="8" fill="#EAB308"/></pattern>
    <pattern id="g-ore-copper" patternUnits="userSpaceOnUse" width="8" height="8"><rect width="8" height="8" fill="#B45309"/></pattern>
    <pattern id="g-ore-gold"   patternUnits="userSpaceOnUse" width="8" height="8"><rect width="8" height="8" fill="#FACC15"/></pattern>

    <!-- 5 大类兜底花纹（doc 里 429 个 HW 代码中没有手绘 pattern 的统一用这套） -->
    <!-- 沉积岩兜底：稀疏水平虚线 -->
    <pattern id="g-cat-sed" patternUnits="userSpaceOnUse" width="14" height="10">
      <rect width="14" height="10" fill="#FAFAF9"/>
      <line x1="0" y1="3" x2="14" y2="3" stroke="#78716C" stroke-width=".35" stroke-dasharray="3,2"/>
      <line x1="0" y1="7" x2="14" y2="7" stroke="#78716C" stroke-width=".35" stroke-dasharray="3,2"/>
    </pattern>
    <!-- 岩浆岩兜底：十字小标记 -->
    <pattern id="g-cat-ign" patternUnits="userSpaceOnUse" width="12" height="12">
      <rect width="12" height="12" fill="#FFFBEB"/>
      <path d="M3,3 L5,3 M4,2 L4,4" stroke="#92400E" stroke-width=".45"/>
      <path d="M9,9 L11,9 M10,8 L10,10" stroke="#92400E" stroke-width=".45"/>
    </pattern>
    <!-- 变质岩兜底：斜向波纹 -->
    <pattern id="g-cat-met" patternUnits="userSpaceOnUse" width="14" height="8">
      <rect width="14" height="8" fill="#F0F9FF"/>
      <path d="M0,2 Q3.5,0 7,2 T14,2" stroke="#0C4A6E" stroke-width=".35" fill="none"/>
      <path d="M0,6 Q3.5,4 7,6 T14,6" stroke="#0C4A6E" stroke-width=".35" fill="none"/>
    </pattern>
    <!-- 覆盖层兜底：散点（土/砂） -->
    <pattern id="g-cat-cov" patternUnits="userSpaceOnUse" width="10" height="10">
      <rect width="10" height="10" fill="#FEFCE8"/>
      <circle cx="2" cy="3" r=".5" fill="#854D0E"/>
      <circle cx="6.5" cy="2" r=".5" fill="#854D0E"/>
      <circle cx="4" cy="7" r=".5" fill="#854D0E"/>
      <circle cx="8.5" cy="8" r=".5" fill="#854D0E"/>
    </pattern>
    <!-- 其它兜底：细网格 -->
    <pattern id="g-cat-oth" patternUnits="userSpaceOnUse" width="10" height="10">
      <rect width="10" height="10" fill="#F5F5F4"/>
      <path d="M0,0 L10,0 M0,0 L0,10" stroke="#A8A29E" stroke-width=".3"/>
    </pattern>
