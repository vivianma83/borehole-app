name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest        # Apple Silicon runner
            args: '--target aarch64-apple-darwin --bundles dmg'
          - platform: macos-13            # Intel runner（兼容老 Mac 用户）
            args: '--target x86_64-apple-darwin --bundles dmg'
          - platform: windows-latest
            # 只出 NSIS（.exe 安装器）：WiX 3.14 对含中文的 MSI 文件名有 bug。
            # NSIS 完全支持 Unicode，体积更小，安装界面更友好。
            args: '--bundles nsis'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust (with target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: Cache Rust deps
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install JS deps
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build app
        run: npm run tauri build -- ${{ matrix.args }}

      # 把 productName 中含中文导致文件名被剥的情况兜底：复制 + 重命名为 ASCII
      # macOS Applications 里 app 显示仍是中文（来自 productName），只是分发文件名 ASCII
      - name: Rename installers
        shell: bash
        run: |
          mkdir -p dist-installers
          # macOS dmg → BoreholeLog_${VERSION}_mac-${ARCH}.dmg
          if ls src-tauri/target/*/release/bundle/dmg/*.dmg 1>/dev/null 2>&1; then
            for f in src-tauri/target/*/release/bundle/dmg/*.dmg; do
              arch=$(echo "$f" | grep -oE 'aarch64|x86_64|x64' || echo "mac")
              cp "$f" "dist-installers/BoreholeLog_${VERSION}_mac-${arch}.dmg"
            done
          fi
          # Windows NSIS exe
          if ls src-tauri/target/release/bundle/nsis/*.exe 1>/dev/null 2>&1; then
            for f in src-tauri/target/release/bundle/nsis/*.exe; do
              cp "$f" "dist-installers/BoreholeLog_${VERSION}_win-x64-setup.exe"
            done
          fi
          ls -la dist-installers/
        env:
          VERSION: ${{ github.ref_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: borehole-app-${{ matrix.platform }}
          path: dist-installers/*
          if-no-files-found: warn
          retention-days: 30

      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-installers/*
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
